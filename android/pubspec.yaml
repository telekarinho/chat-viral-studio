name: chat_viral_studio
description: Chat Viral Studio — vídeos verticais virais de histórias fictícias em chat.
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

# O APK é um WebView do app web (chat-viral-studio.vercel.app): mesma experiência
# completa (editor, voz, exportação, compartilhar) no celular, sem reimplementar nada.
dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
